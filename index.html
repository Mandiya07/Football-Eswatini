<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Eswatini</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="theme-color" content="#002B7F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Football ESW" />
  <script>console.log("INDEX.HTML LOADED");</script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
  
  <div id="global-errors" style="position: fixed; bottom: 0; left: 0; width: 100%; max-height: 50vh; overflow-y: auto; background: rgba(255, 0, 0, 0.9); color: white; font-family: monospace; font-size: 12px; z-index: 100000; padding: 15px; display: none; border-top: 5px solid white;">
      <div style="font-weight: bold; margin-bottom: 10px; font-size: 14px; text-decoration: underline;">CRITICAL SYSTEM ERROR DETECTED</div>
  </div>
  <script>
    window.addEventListener('error', (e) => {
      const errBox = document.getElementById('global-errors');
      if(errBox) {
        errBox.style.display = 'block';
        const msg = (e.error && e.error.message) || e.message || 'Unknown error';
        errBox.innerHTML += 'RUNTIME ERROR: ' + msg + '<br/>';
      }
    });
    window.addEventListener('unhandledrejection', (e) => {
      const errBox = document.getElementById('global-errors');
      if(errBox) {
        errBox.style.display = 'block';
        const reason = e.reason;
        const msg = (reason && (reason.message || String(reason))) || 'Unknown rejection';
        errBox.innerHTML += 'PROMISE REJECTION: ' + msg + '<br/><br/>';
      }
    });
  </script>
</body>
</html>
